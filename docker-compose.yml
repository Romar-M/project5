@'
version: '3.9'

services:
  db:
    image: postgres:14
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-habitdb}
      POSTGRES_USER: ${POSTGRES_USER:-habituser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secretpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U habituser -d habitdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine

  web:
    build: .
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - static_volume:/app/staticfiles
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-habituser}:${POSTGRES_PASSWORD:-secretpassword}@db:5432/${POSTGRES_DB:-habitdb}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change_me_in_production}
      DEBUG: "False"
      ALLOWED_HOSTS: "*"
      TG_BOT_TOKEN: ${TG_BOT_TOKEN}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"

  celery_worker:
    build: .
    command: celery -A config worker -l info
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-habituser}:${POSTGRES_PASSWORD:-secretpassword}@db:5432/${POSTGRES_DB:-habitdb}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "False"
      TG_BOT_TOKEN: ${TG_BOT_TOKEN}
    depends_on:
      - db
      - redis

  celery_beat:
    build: .
    command: celery -A config beat -l info
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-habituser}:${POSTGRES_PASSWORD:-secretpassword}@db:5432/${POSTGRES_DB:-habitdb}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "False"
      TG_BOT_TOKEN: ${TG_BOT_TOKEN}
    depends_on:
      - db
      - redis

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
    ports:
      - "80:80"
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
'@ | Out-File -FilePath docker-compose.yml -Encoding UTF8